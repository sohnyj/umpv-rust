name: Release

on:
  workflow_dispatch:
    inputs:
      auto_tag:
        description: "Read version from Cargo.toml"
        type: boolean
        default: true
      version:
        description: "Manual version (e.g. v0.1.1). Used when auto_tag is off."
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ inputs.auto_tag }}" = "true" ]; then
            echo "tag=v$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Compress
        working-directory: target/x86_64-pc-windows-gnu/release
        run: 7z a -mx=9 ${{ github.workspace }}/umpv-rust.7z umpv.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: umpv-rust.7z
